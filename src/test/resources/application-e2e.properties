# Configuração específica para testes E2E
spring.profiles.active=e2e

# Banner configuration
spring.banner.location=classpath:banner.txt
spring.main.banner-mode=off

# JWT Configuration for tests  
jwt.private.key=classpath:app.key
jwt.public.key=classpath:app.pub

spring.application.name=fortaleza.sabor

# Configuração do banco H2 em memória (similar ao application-test.properties)
spring.datasource.url=jdbc:h2:mem:e2edb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configurações
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SQL initialization
spring.sql.init.mode=never

# Console H2 (para debug se necessário)
spring.h2.console.enabled=false

# Test server configuration
server.port=0

# Configurações de logging para E2E
logging.level.com.br.fiap.fortaleza.sabor=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.io.restassured=WARN

# Configurações específicas da aplicação para E2E
app.jwt.secret=test-secret-key-for-e2e-tests-only
app.jwt.expiration=3600000
